repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: bash -c 'cd backend && uv run pyright'
        language: system
        types: [python]
        pass_filenames: false

      - id: import-linter
        name: import-linter
        entry: bash -c 'cd backend && uv run import-linter lint'
        language: system
        types: [python]
        pass_filenames: false